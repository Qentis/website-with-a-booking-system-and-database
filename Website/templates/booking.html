<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Barbershop - Запись</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>Barbershop</h2>
        <div>
            <a href="home.html">Главная</a>
            <a href="schedule.html">Расписание</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="animate-slide-up" style="color: var(--accent); margin-bottom: 20px;">Онлайн Запись</h1>
        
        <div class="card animate-slide-up delay-1" style="max-width: 600px; margin: 0 auto;">
            <form action="/api/book" method="POST">
                <label>Выберите услугу:</label>
                <select name="service">
                    <option value="haircut">Мужская стрижка</option>
                    <option value="beard">Оформление бороды</option>
                    <option value="combo">Стрижка + Борода</option>
                </select>

                <label>Выберите мастера:</label>
                <select name="master">
                    <option value="1">Алексей (Топ-барбер)</option>
                    <option value="2">Дмитрий</option>
                </select>

                <label>Дата:</label>
                <input type="date" name="date" required>

                <label>Время:</label>
                <input type="time" name="time" required>

                <label>Ваше имя:</label>
                <input type="text" name="client_name" placeholder="Иван Иванов" required>

                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Подтвердить бронирование</button>
            </form>
        </div>
    </div>
</body>
</html>
