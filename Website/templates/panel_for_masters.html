<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Master Panel - Barbershop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>Кабинет Мастера: <span style="color: var(--accent);">Алексей</span></h2>
        <div>
            <a href="home.html" style="color: red;">Выйти</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="animate-fade">Ваши клиенты на сегодня</h1>
        
        <div class="dashboard-grid" style="margin-top: 20px;">
            <div class="card animate-slide-up delay-1">
                <h2 style="color: var(--accent);">10:00</h2>
                <h3>Михаил</h3>
                <p>Услуга: Мужская стрижка</p>
                <button class="btn" style="margin-top: 15px; width: 100%;">Отметить как выполненное</button>
            </div>

            <div class="card animate-slide-up delay-2">
                <h2 style="color: var(--accent);">11:30</h2>
                <h3>Антон</h3>
                <p>Услуга: Стрижка + Борода</p>
                <button class="btn" style="margin-top: 15px; width: 100%;">Отметить как выполненное</button>
            </div>
        </div>
    </div>
</body>
</html>
