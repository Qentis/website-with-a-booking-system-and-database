<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Barbershop - График</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>Barbershop</h2>
        <div>
            <a href="home.html">Главная</a>
            <a href="booking.html" class="btn">Записаться</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="animate-slide-up" style="color: var(--accent); margin-bottom: 20px;">График работы мастеров</h1>
        
        <div class="dashboard-grid">
            <div class="card animate-slide-up delay-1">
                <h3>Алексей</h3>
                <p style="color: var(--text-muted);">Топ-барбер</p>
                <hr style="border-color: var(--border); margin: 10px 0;">
                <p>Пн-Пт: 10:00 - 20:00</p>
                <p>Сб: 10:00 - 16:00</p>
            </div>
            
            <div class="card animate-slide-up delay-2">
                <h3>Дмитрий</h3>
                <p style="color: var(--text-muted);">Барбер</p>
                <hr style="border-color: var(--border); margin: 10px 0;">
                <p>Вт-Сб: 12:00 - 22:00</p>
                <p>Вс: Выходной</p>
            </div>
        </div>
    </div>
</body>
</html>
