{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto bg-white p-10 rounded-3xl shadow-sm border border-gray-100">
    <h3 class="text-2xl font-bold mb-8">Добавить объект</h3>

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        <input name="name" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100" placeholder="Название объекта">
        <input name="address" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100" placeholder="Адрес">
        <textarea name="description" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100" placeholder="Описание" rows="3"></textarea>
        
        <div class="grid grid-cols-2 gap-4">
            <input name="price" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100" placeholder="Цена за ночь">
            <input name="capacity" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100" placeholder="Кол-во гостей">
        </div>

        <select name="type" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100">
            <option value="apartment">Апартаменты</option>
            <option value="private">Дом</option>
        </select>

        <input type="file" name="image" class="w-full p-3 bg-gray-50 rounded-2xl border border-dashed border-gray-300 text-sm">

        <button class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all mt-4">Создать объект</button>
    </form>
</div>

{% endblock %}
