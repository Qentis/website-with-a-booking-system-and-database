<!DOCTYPE html>
<html lang="ru" class="bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXSTAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-extrabold tracking-tighter text-gray-900">LUXSTAY</a>
        
        <nav class="flex items-center gap-3">
            {% if google.authorized %}
                <a href="/dashboard" class="px-5 py-2.5 rounded-full text-sm font-semibold text-gray-700 hover:bg-gray-100 transition-all duration-200">
                    Дашборд
                </a>
                
                <a href="/add_property" class="bg-gray-900 text-white px-6 py-2.5 rounded-full font-semibold text-sm hover:bg-black shadow-lg shadow-gray-200 transition-all duration-200">
                    + Добавить объект
                </a>
                
                <a href="/logout" class="px-5 py-2.5 rounded-full text-sm font-semibold text-red-600 hover:bg-red-50 transition-all duration-200">
                    Выйти
                </a>
            {% else %}
                <a href="{{ url_for('google.login') }}" class="bg-white border border-gray-200 text-gray-900 px-6 py-2.5 rounded-full font-semibold text-sm hover:border-gray-900 hover:bg-gray-900 hover:text-white transition-all duration-200">
                    Войти через Google
                </a>
            {% endif %}
        </nav>
    </div>
</header>

    <main class="max-w-6xl mx-auto py-10 px-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
