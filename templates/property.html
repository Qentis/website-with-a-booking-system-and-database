<h2>{{ prop.name }}</h2>

{% for unit in prop.units %}
    <p>{{ unit.title }} - {{ unit.price }}€</p>
{% endfor %}

<form method="POST" action="/add_unit">
    <input type="hidden" name="property_id" value="{{ prop.id }}">

    <input name="title" placeholder="Room name">
    <input name="capacity">
    <input name="price">

    <button>Add</button>
</form>
